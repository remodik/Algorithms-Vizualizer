name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: AlgoViz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: AlgoViz/src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: AlgoViz
          tagName: ${{ github.ref_name }}
          releaseName: algoviz ${{ github.ref_name }}
          releaseBody: |
            ## Установка
            - **algoviz_x.x.x_x64-setup.exe** — установщик (рекомендуется)
            - **algoviz_x.x.x_x64.msi** — MSI пакет
          releaseDraft: false
          prerelease: false